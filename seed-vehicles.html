    window.seedVehicles = async function() {
      const btn = document.getElementById('seedBtn')
      const log = document.getElementById('log')
      btn.disabled = true
      log.textContent = '🚀 Seeding vehicles to Firestore...\n\n'

      let success = 0
      let failed = 0

      for (const v of vehicles) {
        try {
          const docRef = await addDoc(collection(db, 'vehicles'), {
            ...v,
            createdAt: serverTimestamp(),
          })
          success++
          log.innerHTML += `<span class="success">✅ Added: ${v.name} (${v.city}) — ID: ${docRef.id}</span>\n`
        } catch (err) {
          failed++
          log.innerHTML += `<span class="error">❌ Failed: ${v.name} — ${err.message}</span>\n`
        }
      }

      log.innerHTML += `\n<strong style="color:#ff6b00">Done! ${success} vehicles added, ${failed} failed.</strong>`
      if (success > 0) {
        log.innerHTML += `\n\n<span class="success">🎉 Go to http://localhost:5173/browse to see your vehicles!</span>`
      }
      btn.disabled = false
    }
